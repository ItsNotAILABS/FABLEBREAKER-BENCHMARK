name: "FableBreaker AutoAgent"
description: "Automated adversarial code review for PRs — correctness-first analysis powered by FableBreaker SDK"
author: "ItsNotAI LABS"

branding:
  icon: "shield"
  color: "gray-dark"

inputs:
  github-token:
    description: "GitHub token for posting PR comments"
    required: true
    default: ${{ github.token }}
  scan-pattern:
    description: "Glob pattern for files to analyze (default: '*.py')"
    required: false
    default: "*.py"
  severity-threshold:
    description: "Minimum severity to report: low, medium, high, critical"
    required: false
    default: "low"
  comment-mode:
    description: "How to post results: 'pr-comment', 'review', 'both'"
    required: false
    default: "pr-comment"
  scan-mode:
    description: "What to scan: 'changed-files', 'full-repo', 'directory'"
    required: false
    default: "changed-files"
  target-directory:
    description: "Directory to scan (only used when scan-mode is 'directory')"
    required: false
    default: "."
  fail-on-critical:
    description: "Fail the check if critical issues are found"
    required: false
    default: "true"
  max-issues-per-file:
    description: "Maximum issues to report per file"
    required: false
    default: "10"

outputs:
  total-issues:
    description: "Total number of issues found"
  critical-issues:
    description: "Number of critical issues found"
  security-score:
    description: "Security risk score (0-10)"
  verdict:
    description: "Overall verdict: PASS, WARN, FAIL"
  report-path:
    description: "Path to the full JSON report"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install FableBreaker SDK
      shell: bash
      run: |
        pip install -e ${{ github.action_path }}/..
        pip install -e ${{ github.action_path }}/../fablebreaker_sdk

    - name: Run FableBreaker AutoAgent
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_SCAN_PATTERN: ${{ inputs.scan-pattern }}
        INPUT_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        INPUT_COMMENT_MODE: ${{ inputs.comment-mode }}
        INPUT_SCAN_MODE: ${{ inputs.scan-mode }}
        INPUT_TARGET_DIRECTORY: ${{ inputs.target-directory }}
        INPUT_FAIL_ON_CRITICAL: ${{ inputs.fail-on-critical }}
        INPUT_MAX_ISSUES_PER_FILE: ${{ inputs.max-issues-per-file }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        python ${{ github.action_path }}/agent.py
